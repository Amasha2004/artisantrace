{% extends 'base.html' %}
{% block title %}500 — Server Error · ArtisanTrace{% endblock %}
{% block head %}
<style>
  .error-hero { min-height: 70vh; display: flex; align-items: center; justify-content: center; }
  .error-code { font-size: 8rem; font-weight: 900; line-height: 1;
                background: linear-gradient(135deg, #dc2626, #f97316);
                -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .pulse { animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:.5; } }
</style>
{% endblock %}

{% block content %}
<div class="error-hero">
  <div class="text-center px-3">
    <div class="pulse mb-2">
      <i class="bi bi-exclamation-triangle" style="font-size:5rem; color:#dc2626;"></i>
    </div>
    <div class="error-code">500</div>
    <h2 class="fw-bold mt-2 mb-2">Something Went Wrong</h2>
    <p class="text-muted mb-4" style="max-width:420px; margin:auto;">
      An unexpected server error occurred. Our team has been notified.<br>
      Please try again in a moment.
    </p>
    <div class="d-flex gap-3 justify-content-center flex-wrap">
      <a href="{{ url_for('index') }}" class="btn btn-teal px-4">
        <i class="bi bi-house me-2"></i>Go Home
      </a>
      <button onclick="history.back()" class="btn btn-outline-secondary px-4">
        <i class="bi bi-arrow-left me-2"></i>Go Back
      </button>
    </div>
  </div>
</div>
{% endblock %}
