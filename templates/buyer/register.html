{% extends 'base.html' %}
{% block title %}Register — ArtisanTrace{% endblock %}
{% block content %}
<div class="container py-5" style="max-width:480px;">
  <div class="card border-0 shadow-sm rounded-4 p-4">
    <div class="text-center mb-4">
      <i class="bi bi-person-plus-fill fs-1" style="color:var(--teal)"></i>
      <h3 class="fw-bold mt-2 mb-1">Create Buyer Account</h3>
      <p class="text-muted small">Join ArtisanTrace to track your queries and save products</p>
    </div>
    <form method="post">
      <div class="mb-3">
        <label class="form-label fw-semibold">Full Name</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-person"></i></span>
          <input type="text" name="name" class="form-control" placeholder="Your full name" required autofocus>
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Email Address</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-envelope"></i></span>
          <input type="email" name="email" class="form-control" placeholder="your@email.com" required>
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Password</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" name="password" class="form-control" placeholder="••••••••" required minlength="6">
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold">Confirm Password</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
          <input type="password" name="confirm_password" class="form-control" placeholder="••••••••" required>
        </div>
      </div>
      <button type="submit" class="btn btn-teal w-100 py-2 fw-semibold">
        <i class="bi bi-person-check me-2"></i>Create Account
      </button>
    </form>
    <p class="text-center text-muted small mt-3 mb-0">
      Already have an account?
      <a href="{{ url_for('buyer_login') }}" class="text-decoration-none" style="color:var(--teal)">Login here</a>
    </p>
  </div>
</div>
{% endblock %}
