{% extends 'base.html' %}
{% block title %}My Profile — ArtisanTrace{% endblock %}
{% block content %}
<div class="container py-5" style="max-width:560px;">
  <div class="d-flex align-items-center gap-3 mb-4">
    <a href="{{ url_for('buyer_dashboard') }}" class="btn btn-sm btn-outline-secondary">
      <i class="bi bi-arrow-left"></i>
    </a>
    <h3 class="fw-bold mb-0">Edit Profile</h3>
  </div>

  <div class="card border-0 shadow-sm rounded-4 p-4">
    <form method="post">
      <h6 class="fw-bold text-uppercase mb-3" style="color:var(--teal);font-size:.78rem;letter-spacing:1px;">
        Personal Information
      </h6>
      <div class="mb-3">
        <label class="form-label fw-semibold">Full Name</label>
        <input type="text" name="name" class="form-control" value="{{ buyer.name }}" required>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold">Email Address</label>
        <input type="email" class="form-control" value="{{ buyer.email }}" disabled>
        <div class="form-text">Email cannot be changed</div>
      </div>

      <hr>

      <h6 class="fw-bold text-uppercase mb-3 mt-3" style="color:var(--teal);font-size:.78rem;letter-spacing:1px;">
        Change Password (optional)
      </h6>
      <div class="mb-3">
        <label class="form-label fw-semibold">Current Password</label>
        <input type="password" name="current_password" class="form-control" placeholder="Leave blank to keep current">
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold">New Password</label>
        <input type="password" name="new_password" class="form-control" placeholder="Leave blank to keep current">
      </div>

      <div class="d-flex gap-3">
        <button type="submit" class="btn btn-teal px-4 fw-semibold">
          <i class="bi bi-check-circle me-2"></i>Save Changes
        </button>
        <a href="{{ url_for('buyer_dashboard') }}" class="btn btn-outline-secondary px-4">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
