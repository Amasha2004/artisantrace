{% extends 'base.html' %}
{% block title %}Admin Login — ArtisanTrace{% endblock %}
{% block content %}
<div class="container py-5" style="max-width:420px;">
  <div class="card border-0 shadow-sm rounded-4 p-4">
    <div class="text-center mb-4">
      <i class="bi bi-shield-lock-fill fs-1" style="color:var(--teal)"></i>
      <h3 class="fw-bold mt-2 mb-1">Admin Login</h3>
      <p class="text-muted small">ArtisanTrace Management Panel</p>
    </div>
    <form method="post">
      <div class="mb-3">
        <label class="form-label fw-semibold">Username</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-person"></i></span>
          <input type="text" name="username" class="form-control" placeholder="admin" required autofocus>
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold">Password</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" name="password" class="form-control" placeholder="••••••••" required>
        </div>
      </div>
      <button type="submit" class="btn btn-teal w-100 py-2 fw-semibold">
        <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
      </button>
    </form>
    <p class="text-center text-muted small mt-3 mb-0">Default: admin / admin123</p>
  </div>
  <div class="text-center mt-3">
    <a href="{{ url_for('index') }}" class="text-decoration-none text-muted small">
      <i class="bi bi-arrow-left me-1"></i>Back to public site
    </a>
  </div>
</div>
{% endblock %}
